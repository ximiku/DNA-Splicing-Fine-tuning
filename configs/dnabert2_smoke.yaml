seed: 42

data:
  dataset_dir: data/processed/dnabert2_splice_401_smoke

model:
  name_or_path: zhihan1996/DNABERT-2-117M
  trust_remote_code: true
  disable_triton_flash_attention: true

tokenization:
  max_length: 512
  padding: max_length

smoke:
  max_examples_per_split: 8

training:
  learning_rate: 2.0e-5
  num_train_epochs: 1
  max_steps: 2
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 1
  warmup_ratio: 0.0
  weight_decay: 0.01
  eval_strategy: steps
  save_strategy: steps
  eval_steps: 1
  save_steps: 1
  logging_steps: 1
  load_best_model_at_end: true
  metric_for_best_model: macro_f1
  greater_is_better: true
  save_total_limit: 1
  bf16: false
  fp16: false
  optim: adamw_torch
  dataloader_num_workers: 0
  report_to: none

output:
  output_dir: outputs/dnabert2_smoke

logging:
  level: INFO
